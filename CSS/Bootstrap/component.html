<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />

    <link rel="stylesheet" href="component.css" />

</head>
<body>

    <h2>Navbar</h2>
    <nav class="navbar bg-body-tertiary fixed-top navbar-expand-lg ">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">link</a>
            <button class="navbar-toggler"  data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" >
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="#">home</a>
                    <a class="nav-link" href="#">contact</a>
                    <a class="nav-link" href="#">about</a>
                </div>
            </div>
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <br><hr><br>

    <div class="container">
        <h2>Button</h2>
        <button type="button" class="btn btn-primary btn-lg">btn one</button>
        <button type="button" class="btn btn-outline-secondary">btn two</button>
        <button type="button" class="btn btn-success" disabled>btn three</button>
        <button type="button" class="btn btn-danger">btn four</button>
    
        <button type="button" class="btn btn-link">Link</button>

        <a href="#" class="btn btn-dark">a to btn</a>

        <br><hr><br>
        <h2>Badge</h2>
        <span class="badge text-bg-secondary">New</span>
        <span class="badge text-bg-danger">Danger</span>
        <span class="badge text-bg-warning">Warning</span>
        <span class="badge text-bg-info">Info</span>
        <button class="btn btn-primary">
            Followers
            <span class="badge bg-dark">100+</span>
        </button>

        <br><hr><br>
        <h2>Alert</h2>
        <div class="alert alert-primary">A simple alert</div>
        <a href="#" class="alert-link">an example link</a>
        <div class="alert alert-warning alert-dismissible">No file uploaded
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <br><hr><br>
        <h2>Button group</h2>
        <div class="btn-group">
            <button class="btn btn-primary">left</button>
            <button class="btn btn-warning">middle</button>
            <button class="btn btn-secondary">right</button>
        </div>

        <br><hr><br>
        <h2>Cards</h2>
        <div class="card" style="width: 18rem;">
            <div class="card-header">
                Featured
            </div>
            <img src="..." class="card-img-top" style="width: 100%; height: 10%;">
            <div class="card-body">
                <h3 class="card-title">Title</h3>
                <p class="card-text">Lorem ipsum dolor sit amet consecdolor nihil !</p>
                <a href="#" class="card-link">Card link</a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>     
</body>
</html>
