<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />

</head>
<body>
    <div class="container-md">

        <label for="textip" class="form-label">Text</label>
        <input type="text" id="textip" class="form-control">
        <br>
        <div class="row ">
            <div class="col-md-6">
                <label for="textip" class="form-label">Text</label>
                <input type="text" id="textip" class="form-control">
            </div>
            <div class="col">
                <label for="password" class="col-form-label">Password</label>
                <input type="password" id="password" class="form-control">
            </div>
        </div>
        
        <br>
        <select class="form-select">
            <option>open</option>
            <option>one</option>
            <option>two</option>
            <option>three</option>
        </select>
        
        <br>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="checkbx">
            <label for="chexbx" class="form-check-label">checkbox</label>
        </div>

        <br>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="radio">
            <label for="radio" class="form-check-label">radio</label>
        </div>

        <br>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="checkbx">
            <label for="chexbx" class="form-check-label">checkbox</label>
        </div>
       
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>     
</body>
</html>
