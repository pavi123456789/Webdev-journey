<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asig3</title>
</head>
<body>

    <!-- Q1 -->
    <table border="black">
        <caption>Student Information</caption>
        
        <tr>
            <th rowspan="6">Info</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Address</th>
        </tr>
        <tr>
            <th>City</th>
            <th>House</th>
        </tr>

        <tr>
            <td>A</td>
            <td>Delhi</td>
            <td>1</td>
        </tr>
        <tr>
            <td>B</td>
            <td>Mumbai</td>
            <td>2</td>
        </tr>
        <tr>
            <td>C</td>
            <td>Kolkata</td>
            <td>3</td>
        </tr>
        <tr>
            <td>D</td>
            <td>Pune</td>
            <td>4</td>
        </tr>
    </table>

    <hr>
    <!-- Q2 -->
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name">
        <br />
        <label for="sex">Sex: </label>
        <input type="radio" id="male" name="sex" value="m">
        <label for="male">Male</label>
        <input type="radio" id="female" name="sex" value="f">
        <label for="female">Male</label>
        <br />
        <label for="Country">Country: </label>
        <select name="Country" id="Country">
            <option selected>Select an option</option>
            <option>Austrelia</option>
            <option>England</option>
            <option>Uganda</option>
        </select>
        <br />
        <label for="message">Message: </label>
        <br />
        <textarea name="mesg" id="message" rows="4" cols="40"></textarea>
        <br />
        <input type="checkbox" name="subs" id="subscribe">
        <label for="subscribe">Subscribe?</label>
        <br />
        <button type="submit">Submit</button>
    </form>

    <hr />
    <!-- Q3 -->
    <h2>Feedback Form</h2>
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name" name="nm">
        <br />
        <label for="mail">Email: </label>
        <input type="email" id="mail" name="eml">
        <br />
        <label for="message">Message: </label> <br />
        <textarea id="message" name="msg"></textarea>
        <br />
        <label for="rating">Rate us out of 5: </label> <br />
        <input type="radio" name="rating" id="1">
        <label for="1">1</label>
        <br />
        <input type="radio" name="rating" id="2">
        <label for="2">2</label>
        <br />
        <input type="radio" name="rating" id="3">
        <label for="3">3</label>
        <br />
        <input type="radio" name="rating" id="4">
        <label for="4">4</label>
        <br />
        <input type="radio" name="rating" id="5">
        <label for="5">5</label>
        <br />
        <button type="submit">Send your message!</button>
    </form>
    
</body>
</html>
